{% extends "base.html" %}
{% block title %}Cadastro{% endblock %}
{% block content %}
<div class="card">
  <div class="logo">// NOVO ACESSO</div>
  <h1>CADASTRO</h1>
  <div class="subtitle">CRIAR NOVA CONTA</div>

  <div class="alert" id="alerta"></div>

  <div class="field">
    <label>USUÁRIO</label>
    <input type="text" id="nome" placeholder="seu_usuario" autocomplete="off"/>
  </div>
  <div class="field">
    <label>E-MAIL</label>
    <input type="email" id="email" placeholder="email@dominio.com"/>
  </div>
  <div class="field">
    <label>SENHA</label>
    <input type="password" id="senha" placeholder="••••••••"/>
  </div>
  <div class="field">
    <label>CONFIRMAR SENHA</label>
    <input type="password" id="confirmacao" placeholder="••••••••"/>
  </div>

  <button class="btn" onclick="cadastrar()">► CADASTRAR</button>

  <div class="links">
    <a href="/login">[ JÁ TENHO CONTA ]</a>
  </div>
</div>

<script>
  function mostrarAlerta(msg, tipo) {
    const el = document.getElementById("alerta");
    el.textContent = msg;
    el.className = `alert show alert-${tipo}`;
  }

  async function cadastrar() {
    const nome        = document.getElementById("nome").value;
    const email       = document.getElementById("email").value;
    const senha       = document.getElementById("senha").value;
    const confirmacao = document.getElementById("confirmacao").value;

    const res = await fetch("/api/cadastrar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nome, email, senha, confirmacao })
    });
    const data = await res.json();

    if (data.ok) {
      mostrarAlerta("✔ " + data.msg, "ok");
      setTimeout(() => window.location.href = "/login", 1200);
    } else {
      mostrarAlerta("✕ " + data.msg, "err");
    }
  }
</script>
{% endblock %}
